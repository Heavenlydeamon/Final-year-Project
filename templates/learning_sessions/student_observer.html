{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watching Session | {{ topic.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --accent-green: #00f5a0;
            --accent-blue: #00d9ff;
            --text-main: #ffffff;
            --text-dim: #a0a0ab;
            --glass: rgba(255, 255, 255, 0.05);
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Lexend', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            position: relative;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-media {
            width: 80%;
            height: 60vh;
            border-radius: 3rem;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 50px rgba(0,217,255,0.1);
            margin-bottom: 3rem;
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .slide-media img { width: 100%; height: 100%; object-fit: cover; }

        .slide-text {
            font-size: 42px;
            font-weight: 700;
            text-align: center;
            max-width: 90%;
            line-height: 1.4;
            letter-spacing: -0.02em;
            color: var(--text-main);
            font-family: var(--font-display);
        }

        .activity-content {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .item-card {
            background: var(--glass);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 2rem;
            font-size: 36px;
            font-weight: 600;
            transition: all 0.4s ease;
        }

        .item-card.correct {
            border-color: var(--accent-green);
            background: rgba(0, 245, 160, 0.1);
            box-shadow: 0 0 40px rgba(0, 245, 160, 0.2);
        }

        .reveal-highlight { animation: pulseCorrect 1s infinite alternate; }

        @keyframes pulseCorrect {
            from { box-shadow: 0 0 20px rgba(0, 245, 160, 0); }
            to { box-shadow: 0 0 60px rgba(0, 245, 160, 0.4); }
        }

        /* STATUS BADGE */
        #status-bar {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <div class="status-dot"></div>
        <span class="status-text">Live Session Observer</span>
    </div>

    <div id="viewport">
        <!-- Content will be injected here by JS -->
    </div>

    <!-- DATA SOURCE -->
    <script id="sequence-data" type="application/json">
        {{ sequence_json|safe }}
    </script>

    <script>
        const sequence = JSON.parse(document.getElementById('sequence-data').textContent);
        let currentIdx = -1;
        let isRevealed = false;

        function renderSlide(newIdx, reveal) {
            if (currentIdx === newIdx && isRevealed === reveal) return;
            
            currentIdx = newIdx;
            isRevealed = reveal;

            const viewport = document.getElementById('viewport');
            const data = sequence[currentIdx];
            if (!data) return;

            viewport.innerHTML = '';
            const slide = document.createElement('div');
            slide.className = 'slide active';

            if (data.type === 'story') {
                let mediaHtml = '';
                if (data.data.illustration) {
                    mediaHtml = `<div class="slide-media"><img src="/media/${data.data.illustration}" alt="Story Panel"></div>`;
                }
                slide.innerHTML = `
                    ${mediaHtml}
                    <div class="slide-text">${data.data.text}</div>
                `;
            } else if (data.type === 'activity') {
                let itemsHtml = '';
                if (data.data.items) {
                    itemsHtml = `<div class="activity-content">
                        ${data.data.items.map(item => `
                            <div class="item-card" id="item-${item.id}">
                                ${item.image ? `<img src="${item.image}" style="width: 200px; height: 150px; object-fit: cover; border-radius: 1rem; margin-bottom: 1rem; display: block;">` : ''}
                                ${item.label}
                            </div>
                        `).join('')}
                    </div>`;
                }

                slide.innerHTML = `
                    <div class="slide-text" style="color: var(--accent-blue); font-size: 48px; margin-bottom: 2rem;">Activity: ${data.data.question_text}</div>
                    ${itemsHtml}
                    <div id="explanation-box" class="slide-text" style="margin-top: 3rem; color: var(--accent-green); display: ${isRevealed ? 'block' : 'none'}; font-size: 28px;">
                        ${data.data.explanation || ''}
                    </div>
                `;

                if (isRevealed) {
                    setTimeout(() => revealAnswer(data), 100);
                }
            }

            viewport.appendChild(slide);
        }

        function revealAnswer(data) {
            const answer = data.data.answer;
            Object.keys(answer).forEach(key => {
                const item = document.getElementById(`item-${key}`);
                const target = document.getElementById(`item-${answer[key]}`);
                if (item) item.classList.add('correct', 'reveal-highlight');
                if (target) target.classList.add('correct', 'reveal-highlight');
            });
        }

        async function pollState() {
            try {
                const response = await fetch(`/learning_sessions/${'{{ session.id }}'}/state/`);
                const state = await response.json();
                
                if (state.is_ended) {
                    window.location.reload(); // Or show session ended message
                    return;
                }

                renderSlide(state.current_index, state.is_answer_revealed);
            } catch (err) {
                console.error("Polling failed:", err);
            }
        }

        // Poll every 1 second
        setInterval(pollState, 1000);
        pollState();
    </script>
</body>
</html>
