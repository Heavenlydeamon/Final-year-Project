{% extends "dashboard_base.html" %}
{% load static %}

{% block title %}Daily Challenge - Error{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-lg p-5 rounded-5" style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);">
                <div class="mb-4 text-warning">
                    <i class="fas fa-exclamation-circle display-1"></i>
                </div>
                <h2 class="fw-bold mb-3">Topic Under Construction</h2>
                <p class="text-muted fs-5 mb-4">{{ error }}</p>
                <div class="d-grid gap-2">
                    <a href="{% url 'topic_study' topic.id %}" class="btn btn-primary btn-lg rounded-pill">Back to Chronicles</a>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-lg rounded-pill">To Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
